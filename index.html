<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nichi Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#1b1b1b;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:#ffd700;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.banner{
height:350px;
background:url("https://images.alphacoders.com/131/1319152.jpeg") center/cover;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.banner h1{
font-size:55px;
color:#ffd700;
text-shadow:0 0 20px black;
}

.banner p{
font-size:22px;
margin:10px;
}

button{
padding:15px 35px;
background:#ffd700;
border:none;
font-size:18px;
cursor:pointer;
border-radius:10px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.card h2{
margin:15px 0;
}

.price{
color:#ffd700;
font-size:24px;
margin-bottom:15px;
}
</style>

</head>

<body>

<header>
<div class="logo">NICHI STORE</div>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Discord</a>
</nav>

</header>

<section class="banner">

<h1>NICHI STORE</h1>

<p>Uy tín - Chất lượng</p>

<button onclick="window.open('https://discord.gg/tCdUkBpS')">
🛒 MUA NGAY
</button>

</section>

<section class="products">

<div class="card">

<img src="https://static.wikia.nocookie.net/blox-fruits/images/8/89/KitsuneFruit.png">

<h2>Kitsune Fruit</h2>

<div class="price">850.000đ</div>

<button onclick="window.open('https://discord.gg/tCdUkBpS')">

Mua ngay

</button>

</div>

<div class="card">

<img src="https://static.wikia.nocookie.net/blox-fruits/images/3/39/DragonFruit.png">

<h2>Dragon Fruit</h2>

<div class="price">600.000đ</div>

<button onclick="window.open('https://discord.gg/tCdUkBpS')">

Mua ngay

</button>

</div>

</section>

</body>

</html>

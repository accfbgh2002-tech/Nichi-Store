<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nichi Store</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <div class="logo">
        💗 NICHI STORE
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#shop">Shop</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">

    <h1>NICHI STORE</h1>

    <p>Uy tín • Chất lượng</p>

    <div class="buttons">

        <button onclick="window.location='#shop'">
            🛒 Shop Now
        </button>

        <button class="discord"
        onclick="window.open('https://discord.gg/tCdUkBpS')">

            💬 Discord

        </button>

    </div>

</section>

<section id="shop" class="products">

<div class="card">

<img src="https://static.wikia.nocookie.net/blox-fruits/images/7/75/Kitsune.png">

<h2>Kitsune</h2>

<p>850.000đ</p>

<button>Mua ngay</button>

</div>

<div class="card">

<img src="https://static.wikia.nocookie.net/blox-fruits/images/e/e7/Dragon.png">

<h2>Dragon</h2>

<p>650.000đ</p>

<button>Mua ngay</button>

</div>

<div class="card">

<img src="https://static.wikia.nocookie.net/blox-fruits/images/e/e6/Dough.png">

<h2>Dough</h2>

<p>180.000đ</p>

<button>Mua ngay</button>

</div>

</section>

<footer id="contact">

<h2>NICHI STORE</h2>

<p>Discord: discord.gg/tCdUkBpS</p>

</footer>

<script src="script.js"></script>

</body>
</html>

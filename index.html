<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nichi Store</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <div class="logo">
        💗 NICHI STORE
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#shop">Shop</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">

    <h1>NICHI STORE</h1>

    <p>Uy tín • Chất lượng</p>

    <div class="buttons">

        <button onclick="window.location='#shop'">
            🛒 Shop Now
        </button>

        <button class="discord"
            onclick="window.open('https://discord.gg/tCdUkBpS')">
            💬 Discord
        </button>

    </div>

</section>

<section id="shop" class="products">

    <div class="card">
        <img src="kitsune.jpg" alt="Kitsune">
        <h2>Kitsune</h2>
        <p>85.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="card">
        <img src="dragon.jpg" alt="Dragon">
        <h2>Dragon</h2>
        <p>800.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="card">
        <img src="dough.jpg" alt="Dough">
        <h2>Dough</h2>
        <p>10.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="card">
        <img src="yeti.jpg" alt="Yeti">
        <h2>Yeti</h2>
        <p>50.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="card">
        <img src="spirit.jpg" alt="Spirit">
        <h2>Spirit</h2>
        <p>10.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="card">
        <img src="control.jpg" alt="Control">
        <h2>Control</h2>
        <p>120.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="card">
        <img src="tiger.jpg" alt="Tiger">
        <h2>Tiger</h2>
        <p>50.000đ</p>
        <button>Mua ngay</button>
    </div>

</section>

<footer id="contact">

    <h2>NICHI STORE</h2>

    <p>Discord: discord.gg/tCdUkBpS</p>

</footer>

<script src="script.js"></script>

</body>
</html>
